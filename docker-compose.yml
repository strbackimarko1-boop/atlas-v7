version: "3.8"

services:
  api:
    build: ./atlas-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build: ./atlas-app
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
